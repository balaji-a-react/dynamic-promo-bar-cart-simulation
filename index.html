  <!-- Dynamic Promo Bar & Cart Simulation -->

  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Promo Cart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="promo-bar">
    <span id="promo-message">You are $100 away from Free Shipping!</span>
    <button id="close-btn">&#x2715;</button>
  </div>

  <header>
  <div class="logo">Dimag Store</div>
  <div class="cart-badge">
    Cart: <span id="header-total">$0</span>
  </div>
</header>

<main>
  <h2 class="section-title">Featured Products</h2>

  <div class="products-grid">

    <div class="product-card">
      <div class="product-title">Classic Sneakers</div>
      <div class="product-price">$30</div>
      <button class="add-to-cart" data-price="30">Add to Cart</button>
    </div>

    <div class="product-card">
      <div class="product-title">Wireless Headphones</div>
      <div class="product-price">$50</div>
      <button class="add-to-cart" data-price="50">Add to Cart</button>
    </div>

    <div class="product-card">
      <div class="product-title">Urban Backpack</div>
      <div class="product-price">$80</div>
      <button class="add-to-cart" data-price="80">Add to Cart</button>
    </div>

  </div>

  <button id="clear-cart">Clear Cart</button>
</main>

  <script src="script.js"></script>
</body>
</html>
